<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>{% block title %}STL Search{% endblock %}</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,400;0,9..40,700;1,9..40,400&family=Fraunces:opsz,wght@9..144,600&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="/static/styles.css?v=nav2" />
  </head>
  <body class="{% block body_class %}{% endblock %}">
    {% block topbar %}
    <header class="site-top">
      <div class="site-brand">
        <a class="site-logo" href="/">STL Search</a>
        <span
          class="instance-chip"
          id="instance-chip"
          title="Which server is handling this page"
          hidden
        ><span class="instance-chip-short" id="instance-chip-short"></span><span class="instance-chip-full" id="instance-chip-full"></span></span>
      </div>
      <nav class="site-nav" aria-label="Main">
        <a class="site-nav-link" href="/" data-nav="home">Home</a>
        <a class="site-nav-link" href="/downloads" data-nav="downloads">Downloads</a>
        <div class="site-nav-more" id="site-nav-more">
          <button
            type="button"
            class="site-nav-link site-nav-more-btn"
            id="site-nav-more-btn"
            aria-expanded="false"
            aria-haspopup="true"
            aria-controls="site-nav-more-menu"
            data-nav-more
          >
            Other
            <span class="site-nav-caret" aria-hidden="true">▾</span>
          </button>
          <div class="site-nav-menu" id="site-nav-more-menu" hidden role="menu">
            <a class="site-nav-menu-link" href="/#favorites" data-nav="favorites" role="menuitem">Favorites</a>
            <a class="site-nav-menu-link" href="/manage" data-nav="manage" role="menuitem">Manage</a>
            <a class="site-nav-menu-link" href="/settings" data-nav="settings" role="menuitem">Settings</a>
          </div>
        </div>
      </nav>
    </header>
    {% endblock %}
    {% block body %}{% endblock %}
    {% block topbar_end %}
    <button type="button" class="back-to-top" id="back-to-top" hidden aria-label="Back to top" title="Back to top">
      <svg viewBox="0 0 24 24" width="22" height="22" aria-hidden="true" focusable="false">
        <path
          fill="currentColor"
          d="M12 5.5 4.8 12.2a1 1 0 0 0 1.4 1.4L11 8.9V19a1 1 0 1 0 2 0V8.9l4.8 4.7a1 1 0 0 0 1.4-1.4L12 5.5z"
        />
      </svg>
    </button>
    {% endblock %}
    <script>
      (function () {
        function syncNav() {
          const path = location.pathname.replace(/\/$/, "") || "/";
          const hash = location.hash || "";
          let moreActive = false;
          document.querySelectorAll("[data-nav]").forEach((a) => {
            const key = a.getAttribute("data-nav");
            let active = false;
            if (key === "home") {
              active =
                (path === "/" && hash !== "#favorites") ||
                path === "/results" ||
                path.startsWith("/channel/");
            } else if (key === "favorites") {
              active = path === "/" && hash === "#favorites";
            } else if (key === "manage") active = path === "/manage";
            else if (key === "downloads") active = path === "/downloads";
            else if (key === "settings") active = path === "/settings";
            a.classList.toggle("is-active", active);
            if (active && (key === "favorites" || key === "manage" || key === "settings")) {
              moreActive = true;
            }
          });
          const moreBtn = document.getElementById("site-nav-more-btn");
          if (moreBtn) moreBtn.classList.toggle("is-active", moreActive);
        }
        syncNav();
        window.addEventListener("hashchange", syncNav);

        const moreWrap = document.getElementById("site-nav-more");
        const moreBtn = document.getElementById("site-nav-more-btn");
        const moreMenu = document.getElementById("site-nav-more-menu");
        function closeMore() {
          if (!moreBtn || !moreMenu) return;
          moreMenu.hidden = true;
          moreBtn.setAttribute("aria-expanded", "false");
          moreWrap?.classList.remove("is-open");
        }
        function toggleMore() {
          if (!moreBtn || !moreMenu) return;
          const open = moreMenu.hidden;
          moreMenu.hidden = !open;
          moreBtn.setAttribute("aria-expanded", open ? "true" : "false");
          moreWrap?.classList.toggle("is-open", open);
        }
        moreBtn?.addEventListener("click", (ev) => {
          ev.stopPropagation();
          toggleMore();
        });
        moreMenu?.querySelectorAll("a").forEach((a) => {
          a.addEventListener("click", () => closeMore());
        });
        document.addEventListener("click", (ev) => {
          if (!moreWrap?.contains(ev.target)) closeMore();
        });
        document.addEventListener("keydown", (ev) => {
          if (ev.key === "Escape") closeMore();
        });

        const chip = document.getElementById("instance-chip");
        const chipShort = document.getElementById("instance-chip-short");
        const chipFull = document.getElementById("instance-chip-full");
        async function syncInstanceChip() {
          if (!chip) return;
          try {
            const res = await fetch("/health", { headers: { Accept: "application/json" } });
            if (!res.ok) return;
            const data = await res.json();
            const instance = (data.instance || "").toLowerCase();
            const host = data.hostname || instance || "server";
            const folder =
              data.download_label ||
              (instance === "synology" ? "NAS folder" : "PC folder");
            const shortLabel = instance === "synology" ? "Synology" : "Windows";
            const fullLabel =
              instance === "synology"
                ? `Synology · ${folder}`
                : `Windows · ${folder}`;
            if (chipShort) chipShort.textContent = shortLabel;
            if (chipFull) chipFull.textContent = fullLabel;
            chip.title = `${host} — downloads: ${data.download_dir || folder}`;
            chip.hidden = false;
            chip.classList.toggle("is-windows", instance !== "synology");
            chip.classList.toggle("is-synology", instance === "synology");
          } catch (e) {}
        }
        syncInstanceChip();
        window.setInterval(syncInstanceChip, 15000);

        const topBtn = document.getElementById("back-to-top");
        if (topBtn) {
          const syncTopBtn = () => {
            topBtn.hidden = window.scrollY < 280;
          };
          topBtn.addEventListener("click", () => {
            window.scrollTo({ top: 0, behavior: "smooth" });
          });
          window.addEventListener("scroll", syncTopBtn, { passive: true });
          syncTopBtn();
        }
      })();
    </script>
  </body>
</html>
